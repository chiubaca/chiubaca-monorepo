packages:
  - apps/*
catalog:
  typescript: ^5.8.3
  wrangler: ^4.87.0
  astro: ^6.3.0
  tailwindcss: ^4.1.6
  "@tailwindcss/vite": ^4.1.6
  "@tailwindcss/typography": ^0.5.16
  "@fontsource/bebas-neue": ^5.2.7
  "@fontsource/jetbrains-mono": ^5.2.8
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
  - sharp
  - workerd
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
